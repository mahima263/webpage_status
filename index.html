<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Complete Webpage Inventory | Live + Pending (2024–2026)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #f8f6f2;
            color: #1f1f1f;
            padding: 1rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            overflow: hidden;
            padding: 1.5rem;
        }
        @media (min-width: 768px) {
            body { padding: 2rem 1.5rem; }
            .container { padding: 2rem 1.8rem; }
        }
        .header {
            border-bottom: 3px solid #b58b2f;
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }
        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #8b1e3f;
            letter-spacing: -0.2px;
        }
        @media (min-width: 480px) {
            .header h1 { font-size: 1.7rem; }
        }
        .header p {
            color: #5a5a5a;
            margin-top: 0.25rem;
            font-size: 0.8rem;
        }
        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #8b1e3f;
            margin: 0.5rem 0 1rem 0;
            border-left: 5px solid #b58b2f;
            padding-left: 0.9rem;
        }
        .table-wrapper {
            overflow-x: auto;
            border-radius: 18px;
            border: 1px solid #e2dbd0;
            background: white;
            margin: 1rem 0 1.2rem;
            -webkit-overflow-scrolling: touch;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            min-width: 500px;
        }
        @media (min-width: 640px) {
            table { font-size: 0.85rem; min-width: auto; }
        }
        th {
            text-align: left;
            padding: 0.8rem 0.8rem;
            background: #f9f7f3;
            font-weight: 600;
            color: #8b1e3f;
            border-bottom: 1px solid #e2dbd0;
        }
        td {
            padding: 0.7rem 0.8rem;
            border-bottom: 1px solid #f0ede8;
            word-break: break-word;
        }
        tr:hover td {
            background: #fefaf0;
        }
        .status-live {
            background: #e8f5e9;
            color: #2e6b2f;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
            white-space: nowrap;
        }
        .status-live i, .status-onprocess i, .status-imagesissue i, .status-contentpending i, .status-cancel i {
            margin-right: 4px;
        }
        .status-onprocess {
            background: #fff3e0;
            color: #b85c00;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
        }
        .status-imagesissue {
            background: #ffebee;
            color: #c62828;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
        }
        .status-contentpending {
            background: #fce4ec;
            color: #ad1457;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
        }
        .status-cancel {
            background: #eceff1;
            color: #546e7a;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
        }
        .footer-note {
            margin-top: 1.5rem;
            font-size: 0.7rem;
            color: #7e7a74;
            text-align: center;
            border-top: 1px solid #e9e2d8;
            padding-top: 1rem;
        }
        .webpage-link {
            text-decoration: none;
            color: #1f1f1f;
            font-weight: 500;
            transition: color 0.2s;
        }
        .webpage-link:hover {
            color: #8b1e3f;
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-table-list"></i> Complete Webpage Inventory</h1>
        <p>Delivered (LIVE) + Pending / Cancelled · 2024 → 2025 cycle</p>
    </div>

    <div class="section-title">
        📋 All Webpages (1 to 45)
    </div>

    <div class="table-wrapper">
        <table id="masterTable">
            <thead>
                <tr><th>#</th><th>Webpage Name</th><th>Status</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
   
</div>

<script>
    // ----- BETA LINK FOR ZOHO PAGES (change this to your actual beta dashboard) -----
    const ZOHO_BETA_LINK = "https://iitk.ac.in/dora/zoho-portal-beta";

    // ----- YOUR EXACT DELIVERED PAGES (links untouched) -----
    const deliveredPages = [
        { name: "IITK Vision Fund", url: "https://iitk.ac.in/dora/iitkvisionfund/", statusType: "live", label: "Live" },
        { name: "Planned Giving", url: "https://iitk.ac.in/dora/planned-giving/", statusType: "live", label: "Live" },
        { name: "FACE", url: "https://iitk.ac.in/dora/face/", statusType: "live", label: "Live" },
        { name: "IITK Samanvay", url: "https://iitk.ac.in/dora/iitk-samanvay-2025/", statusType: "live", label: "Live" },
        { name: "CSR", url: "https://iitk.ac.in/dora/csr/", statusType: "live", label: "Live" },
        { name: "CSR Fund Scholarship", url: "https://iitk.ac.in/dora/csr-funded-scholarships/", statusType: "live", label: "Live" },
        { name: "IITKarvaan", url: "https://iitk.ac.in/dora/iitkarvaan-2025/", statusType: "live", label: "Live" },
        { name: "Annual Giving", url: "https://iitk.ac.in/dora/annualgiving/", statusType: "live", label: "Live" },
        { name: "Annual Giving with Form", url: "https://iitk.ac.in/dora/annualgiving/", statusType: "live", label: "Live" },
        { name: "Season of Giving", url: "https://iitkfoundation.org/season-of-giving/", statusType: "live", label: "Live" },
        { name: "MAGIK", url: "https://iitk.ac.in/dora/magik/", statusType: "live", label: "Live" },
        { name: "MAGIK with form", url: "https://iitk.ac.in/dora/magik/", statusType: "live", label: "Live" },
        { name: "Class of 2000", url: "https://iitk.ac.in/dora/reunion/class-of-2000/", statusType: "live", label: "Live" },
        { name: "Class of 1986", url: "https://iitk.ac.in/dora/reunion/class-of-1986/", statusType: "live", label: "Live" },
        { name: "Class of 1976", url: "https://iitk.ac.in/dora/reunion/class-of-1976/", statusType: "live", label: "Live" },
        { name: "Class of 2011", url: "https://iitk.ac.in/dora/reunion/class-of-2011/", statusType: "live", label: "Live" },
        { name: "Class of 1991", url: "https://iitk.ac.in/dora/reunion/class-of-1991/", statusType: "live", label: "Live" },
        { name: "Class of 1966", url: "https://iitk.ac.in/dora/reunion/class-of-1966/", statusType: "live", label: "Live" },
        { name: "Class of 2015", url: "https://iitk.ac.in/dora/reunion/class-of-2015/", statusType: "live", label: "Live" },
        { name: "Class of 1990", url: "https://iitk.ac.in/dora/reunion/class-of-1990/", statusType: "live", label: "Live" },
        { name: "Zoho Project Dashboard", url: "", statusType: "live", label: "Live", isZoho: true },
        { name: "Zoho Upcoming Events", url: "", statusType: "live", label: "Live", isZoho: true },
        { name: "Zoho Award Nominations", url: "", statusType: "live", label: "Live", isZoho: true },
        { name: "Zoho Giving Back", url: "", statusType: "live", label: "Live", isZoho: true },
        { name: "Zoho Pledge", url: "", statusType: "live", label: "Live", isZoho: true },
        { name: "Zoho project", url: "", statusType: "live", label: "Live", isZoho: true },
        { name: "Zoho My Contribution", url: "", statusType: "live", label: "Live", isZoho: true },
        { name: "Zoho Alumni Services", url: "", statusType: "live", label: "Live", isZoho: true },
        { name: "Zoho VH booking", url: "", statusType: "live", label: "Live", isZoho: true },
        { name: "Zoho Reunion Admin page", url: "", statusType: "live", label: "Live", isZoho: true },
        { name: "Giving Back", url: "https://iitk.ac.in/dora/giveback/", statusType: "live", label: "Live" },
        { name: "Annual Giving 2024", url: "", statusType: "live", label: "Live", showUpdatePopup: true },
        { name: "IITK Samanvay 2024", url: "", statusType: "live", label: "Live" },
        { name: "Research Proposals", url: "https://iitk.ac.in/dora/ProposalPortal/dist/indexnew.html", statusType: "live", label: "Live" },
        { name: "M.A.G.I.K 2024", url: "", statusType: "live", label: "Live", showUpdatePopup: true }
    ];

    // Pending / cancelled items (unchanged from your original)
    const pendingNon2026 = [
        { name: "Young Faculty Fellowship", url: "https://young-faculty-fellowship.vercel.app/", statusType: "cancel", label: "Cancelled" },
        { name: "Class of 1999", url: "#", statusType: "contentpending", label: "Content Pending" },
        { name: "1$ campaign", url: "#", statusType: "cancel", label: "Cancelled" },
        { name: "Gangwal School", url: "#", statusType: "cancel", label: "Cancelled" }
    ];

    const pending2026 = [
        { name: "IITKarvaan main page 2026", url: "#", statusType: "onprocess", label: "On Process" },
        { name: "A.I.M 2026", url: "#", statusType: "imagesissue", label: "Images Issue" },
        { name: "Community Welfare (includes 6 pages) 2026", url: "#", statusType: "onprocess", label: "On Process" }
    ];

    // New pages as requested (added at the bottom)
    const extraPages = [
        { name: "Kaira Karmakar Memorial Scholarship", url: "https://iitk.ac.in/dora/kaira-karmakar-memorial-scholarship/", statusType: "live", label: "Live" },
        { name: "Kotak School of Sustainability", url: "#", statusType: "cancel", label: "Cancelled" },

        { name: "Class of 1967 Memorial Page", url: "https://classof1967-246h.vercel.app/", statusType: "cancel", label: "Cancelled" }

    ];

    // Combine everything in order: delivered (35) + pendingNon2026 (4) + pending2026 (3) + extra (2) = 45
    const allItems = [...deliveredPages, ...pendingNon2026, ...pending2026, ...extraPages];

    // Helper to handle clicks without removing any original link behaviour
    function handleLinkClick(event, item) {
        // For Zoho pages: show confirm and go to beta link
        if (item.isZoho) {
            event.preventDefault();
            const ok = confirm("This is a Zoho login portal (beta link).\nDo you want to proceed to the beta dashboard?");
            if (ok) window.open(ZOHO_BETA_LINK, '_blank');
            return;
        }
        // For Annual Giving 2024 & M.A.G.I.K 2024: update popup
        if (item.showUpdatePopup) {
            event.preventDefault();
            alert("⚠️ This page has been updated! You will now be redirected to the latest version.");
            // If a URL exists, use it; otherwise just inform
            if (item.url && item.url !== "" && item.url !== "#") {
                window.open(item.url, '_blank');
            } else {
                alert("Please add the correct URL manually in the code for this page.");
            }
            return;
        }
        // For pages with empty or placeholder link, prevent default and show message
        if (!item.url || item.url === "" || item.url === "#") {
            event.preventDefault();
            alert("No link available for this page yet. You can add it later in the 'url' field.");
        }
        // Otherwise the link works normally (href is already set)
    }

    // Render table
    const tbody = document.querySelector('#masterTable tbody');
    tbody.innerHTML = '';

    allItems.forEach((item, index) => {
        const row = tbody.insertRow();
        row.insertCell(0).textContent = index + 1;

        const nameCell = row.insertCell(1);
        const link = document.createElement('a');
        // Set href normally for non‑special items, but for Zoho/update/empty we use javascript:void(0) to let the handler decide
        if (item.isZoho || item.showUpdatePopup || !item.url || item.url === "" || item.url === "#") {
            link.href = "javascript:void(0);";
        } else {
            link.href = item.url;
        }
        link.textContent = item.name;
        link.className = 'webpage-link';
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.addEventListener('click', (e) => handleLinkClick(e, item));
        nameCell.appendChild(link);

        // Status badge
        let statusClass = '';
        let iconHtml = '';
        switch(item.statusType) {
            case 'live':
                statusClass = 'status-live';
                iconHtml = '<i class="fas fa-check-circle"></i>';
                break;
            case 'onprocess':
                statusClass = 'status-onprocess';
                iconHtml = '<i class="fas fa-spinner fa-pulse"></i>';
                break;
            case 'imagesissue':
                statusClass = 'status-imagesissue';
                iconHtml = '<i class="fas fa-image"></i>';
                break;
            case 'contentpending':
                statusClass = 'status-contentpending';
                iconHtml = '<i class="fas fa-file-alt"></i>';
                break;
            case 'cancel':
                statusClass = 'status-cancel';
                iconHtml = '<i class="fas fa-ban"></i>';
                break;
            default:
                statusClass = 'status-onprocess';
                iconHtml = '<i class="fas fa-spinner"></i>';
        }
        row.insertCell(2).innerHTML = `<span class="${statusClass}">${iconHtml} ${item.label}</span>`;
    });
</script>
</body>
</html>
